# cargo-deny configuration. Run: cargo deny check
# CI gates on advisories, bans, sources, and licenses (see .github/workflows/ci.yml).

[advisories]
version = 2
# Fail on any RustSec advisory or yanked crate.
yanked = "deny"

[bans]
# Flag accidental duplicate versions of the same crate.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io; no unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "MIT-0",
    # webpki-roots (TLS root store, via the HTTP range backend).
    "CDLA-Permissive-2.0",
    # Pure-Rust bzip2 port (libbz2-rs-sys, pulled via sevenz-rust2): the
    # upstream bzip2 license is BSD-style permissive.
    "bzip2-1.0.6",
]
