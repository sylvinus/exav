name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --features exav-core/http -- -D warnings
      - run: cargo test --all
      - run: cargo test -p exav-core --features http

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: cargo-deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories bans sources licenses

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo-fuzz smoke run
        run: |
          cargo install cargo-fuzz --locked
          for t in filetype sigs cvd pe unpack analyze bytecode; do
            cargo +nightly fuzz run "$t" -- -max_total_time=60 -rss_limit_mb=2048 -timeout=10
          done
